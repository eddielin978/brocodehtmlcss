<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
    <link rel="stylesheet" href="button.css" type="text/css" />
  </head>
  <body>
    <h1>Button</h1>
    <a href="index.html" id="home-button">Home</a>
    <hr />
    <span>
      I heard that buttons aren't supposed to be used for links, so my home buttons will now be
      links that look like buttons. </span
    ><br />
    <span>A functional button:</span>
    <div id="button">
      <button>Click</button>
    </div>
    <div id="clicks">Clicks: 0</div>
    <div id="reset">
      <button>Reset Clicks</button>
    </div>
    <script src="button.js"></script>
  </body>
</html>
